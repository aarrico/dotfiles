unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -s escape-time 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g default-terminal "xterm-256color"
set -as terminal-features ",xterm-256color:RGB"

set -g status-style "bg=default,fg=#a9b1d6"
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g status-left "#[fg=#7aa2f7,bold] 󰘓 #S #[fg=#3b4261]▪ "
set -g status-left-length 50
set -g status-right "#[fg=#bb9af7]󱎫 %H:%M #[fg=#3b4261]▪ #[fg=#e0af68] %Y-%m-%d "
set -g status-justify left
set -g window-status-style "fg=#565f89"
set -g window-status-format " #I:#W "
set -g window-status-current-style "fg=#7dcfff,bold"
set -g window-status-current-format " #I:#W* "
